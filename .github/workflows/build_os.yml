name: Build OS
on: [push]

jobs:
  build-kiddoz:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Tooling
        run: sudo apt-get install -y g++ xorriso grub-pc-bin mtools libisoburn-dev xxd

      - name: Compile and Package KiddozOS
        run: |

          as --32 src/boot.s -o boot.o
          

          g++ -m32 -ffreestanding -fno-stack-protector -fno-exceptions -fno-rtti -c src/kernel.cpp -o kernel.o
          g++ -m32 -ffreestanding -fno-stack-protector -fno-exceptions -fno-rtti -c src/ksh.cpp -o ksh.o


          ld -m elf_i386 -T linker.ld boot.o kernel.o ksh.o -o kernel.bin


          mkdir -p iso/boot/grub
          
          if [ -d "src/root" ]; then
            cat src/root/* > iso/boot/root.img
          else
            echo "KMC-1 Initialized" > iso/boot/root.img
          fi
          
          cp kernel.bin iso/boot/
          

          echo 'set timeout=0' > iso/boot/grub/grub.cfg
          echo 'set default=0' >> iso/boot/grub/grub.cfg
          echo 'menuentry "KiddoZ OS" {' >> iso/boot/grub/grub.cfg
          echo '  multiboot /boot/kernel.bin' >> iso/boot/grub/grub.cfg
          echo '  module /boot/root.img' >> iso/boot/grub/grub.cfg
          echo '  boot' >> iso/boot/grub/grub.cfg
          echo '}' >> iso/boot/grub/grub.cfg
          
  
          grub-mkrescue -o kiddoz.iso iso

      - name: Upload KiddoZ ISO file
        uses: actions/upload-artifact@v4
        with:
          name: KiddoZ-OS-Package
          path: kiddoz.iso  
          if-no-files-found: error