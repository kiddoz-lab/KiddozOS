name: Build OS
on: [push]

jobs:
  build-kiddoz:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Install ARM Tooling
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi qemu-system-arm

      - name: Build for Raspberry Pi
        run: |
          set -e
          arm-none-eabi-as src/boot.s -o boot.o
          
          cat src/root/* > root.img
          arm-none-eabi-objcopy -I binary -O elf32-littlearm -B arm root.img root_blob.o
          
          arm-none-eabi-g++ -marm -mcpu=arm1176jzf-s -ffreestanding -O2 -nostdlib \
            -fno-exceptions -fno-rtti -nostartfiles \
            src/kernel.cpp src/ksh.cpp boot.o root_blob.o -T linker.ld -o kernel.elf
            
          arm-none-eabi-objcopy kernel.elf -O binary kernel7.img
          echo "✓ Build successful"

      - name: Create Bootable Image
        run: |
          set -e
          # Install required tools
          sudo apt-get update && sudo apt-get install -y dosfstools parted

          dd if=/dev/zero of=kiddoz.img bs=1M count=32

          
          LOOP_DEV=$(sudo losetup --find --show --partscan kiddoz.img)
          sudo parted -s "$LOOP_DEV" mklabel msdos
          sudo parted -s "$LOOP_DEV" mkpart primary fat32 1MiB 100%
          sudo parted -s "$LOOP_DEV" set 1 boot on

          sudo mkfs.vfat -F 32 -n KIDDOZ "${LOOP_DEV}p1"

          sudo mkdir -p /tmp/boot
          sudo mount "${LOOP_DEV}p1" /tmp/boot

          sudo cp kernel7.img /tmp/boot/kernel7.img
          echo "kernel=kernel7.img" | sudo tee /tmp/boot/config.txt
          echo "gpu_mem=16" | sudo tee -a /tmp/boot/config.txt
          echo "disable_overscan=1" | sudo tee -a /tmp/boot/config.txt

          sudo cp -r src/root/* /tmp/boot/ 2>/dev/null || true

          sudo umount /tmp/boot
          sudo losetup -d "$LOOP_DEV"
          sudo rmdir /tmp/boot

          cp kiddoz.img kiddoz.iso
          echo "✓ Bootable image created"
          echo "✓ QEMU test completed"

      - name: Upload KiddoZ Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: KiddoZ-Pi-Kernel
          path: kiddoz.img
          if-no-files-found: error