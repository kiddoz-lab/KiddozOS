name: Build OS
on: [push]

jobs:
  build-kiddoz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Tooling
        run: sudo apt-get install -y g++ xorriso grub-pc-bin

      - name: Compile KiddozOS
        run: |
          g++ -m32 -ffreestanding -c kernel.cpp -o kernel.o
          # Insert KOSK logic here to make the ISO

      - name: Upload KiddoZ ISO file
        uses: actions/upload-artifact@v4
        with:
          name: KiddoZ-OS-v0.1
          path: kiddoz.iso
